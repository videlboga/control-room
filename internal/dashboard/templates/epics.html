{{template "layout" .}}
{{define "title"}}Эпики{{end}}
{{define "content"}}
<h1>Эпики</h1>
<div class="card">
	<h2>Создать эпик</h2>
	<form id="create-epic">
		<input type="text" name="title" placeholder="название" required>
		<textarea name="description" placeholder="описание" rows="3" required></textarea>
		<select name="project_id" required>
			{{range .Projects}}
				<option value="{{.ID}}">{{.Title}}</option>
			{{end}}
		</select>
		<button type="submit">Создать</button>
	</form>
</div>
<div class="card">
	<h2>Все эпики</h2>
	<table>
		<tr><th>Display ID</th><th>Internal ID</th><th>Название</th><th>Проект</th><th>Статус</th></tr>
		{{range .Epics}}
		<tr>
			<td><strong>{{.DisplayID}}</strong></td>
			<td class="muted">{{.ID}}</td>
			<td>{{.Title}}</td>
			<td>{{.ProjectID}}</td>
			<td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
		</tr>
		{{end}}
	</table>
</div>
<script>
document.getElementById('create-epic').addEventListener('submit', function(e) {
	e.preventDefault();
	const fd = new FormData(this);
	const body = {};
	fd.forEach((v,k)=>body[k]=v);
	fetch('/api/v1/epics', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)})
		.then(r=>r.json()).then(()=>location.reload());
});
</script>
{{end}}
