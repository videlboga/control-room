{{template "layout" .}}
{{define "title"}}Задачи{{end}}
{{define "content"}}
<h1>Задачи</h1>
<div class="card">
	<h2>Создать задачу</h2>
	<form id="create-task">
		<select name="project_id" required>
			{{range .Projects}}<option value="{{.ID}}">{{.Title}}</option>{{end}}
		</select>
		<select name="team_id" required>
			{{range .Teams}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
		</select>
		<select name="type" required>
			{{range .Types}}<option value="{{.}}">{{.}}</option>{{end}}
		</select>
		<input type="text" name="title" placeholder="название" required>
		<textarea name="description" placeholder="описание"></textarea>
		<input type="text" name="specialization" placeholder="специализация">
		<button type="submit">Создать</button>
	</form>
</div>
<div class="card">
	<h2>Фильтры</h2>
	<form method="get" class="filters">
		<select name="project">
			<option value="">Все проекты</option>
			{{range .Projects}}<option value="{{.ID}}" {{if eq $.FilterProj .ID}}selected{{end}}>{{.Title}}</option>{{end}}
		</select>
		<select name="agent">
			<option value="">Все агенты/команды</option>
			{{range .Teams}}<option value="{{.ID}}" {{if eq $.FilterAgent .ID}}selected{{end}}>{{.Name}}</option>{{end}}
		</select>
		<select name="status">
			<option value="">Все статусы</option>
			{{range .Statuses}}<option value="{{.}}" {{if eq $.FilterStatus .}}selected{{end}}>{{.}}</option>{{end}}
		</select>
		<select name="type">
			<option value="">Все типы</option>
			{{range .Types}}<option value="{{.}}" {{if eq $.FilterType .}}selected{{end}}>{{.}}</option>{{end}}
		</select>
		<button type="submit">Применить</button>
		<a href="/tasks"><button type="button">Сбросить</button></a>
	</form>
</div>
<div class="card">
	<h2>Задачи ({{len .Tasks}})</h2>
	<table>
		<tr><th>Display ID</th><th>Internal ID</th><th>Название</th><th>Проект</th><th>Тип</th><th>Статус</th></tr>
		{{range .Tasks}}
		<tr>
			<td><a href="/tasks/{{.ID}}"><strong>{{.DisplayID}}</strong></a></td>
			<td class="muted">{{.ID}}</td>
			<td>{{.Title}}</td>
			<td>{{.ProjectID}}</td>
			<td>{{.Type}}</td>
			<td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
		</tr>
		{{end}}
	</table>
</div>
<script>
document.getElementById('create-task').addEventListener('submit', function(e) {
	e.preventDefault();
	const fd = new FormData(this);
	const body = {};
	fd.forEach((v,k)=>body[k]=v);
	fetch('/api/v1/tasks', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)})
		.then(r=>r.json()).then(()=>location.reload());
});
</script>
{{end}}
