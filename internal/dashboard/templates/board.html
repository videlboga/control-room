{{template "layout" .}}
{{define "title"}}Board{{end}}
{{define "content"}}
<h1>Kanban Board</h1>
<div class="card">
	<form method="get" class="filters">
		<select name="project">
			<option value="">Все проекты</option>
			{{range .Projects}}<option value="{{.ID}}" {{if eq $.FilterProj .ID}}selected{{end}}>{{.Title}}</option>{{end}}
		</select>
		<select name="agent">
			<option value="">Все агенты/команды</option>
			{{range .Teams}}<option value="{{.ID}}" {{if eq $.FilterAgent .ID}}selected{{end}}>{{.Name}}</option>{{end}}
		</select>
		<select name="type">
			<option value="">Все типы</option>
			{{range .Types}}<option value="{{.}}" {{if eq $.FilterType .}}selected{{end}}>{{.}}</option>{{end}}
		</select>
		<button type="submit">Применить</button>
		<a href="/board"><button type="button">Сбросить</button></a>
	</form>
</div>
<div class="board" id="board">
{{range .Columns}}
<div class="board-column" data-status="{{.Status}}">
	<h3>{{.Status}} <span class="count">({{len .Tasks}})</span></h3>
	<div class="task-list" ondrop="drop(event)" ondragover="allowDrop(event)">
	{{range .Tasks}}
		<div class="task-card" draggable="true" ondragstart="drag(event)" data-id="{{.ID}}" data-display="{{.DisplayID}}">
			<div class="task-title">{{.Title}}</div>
			<div class="task-meta">{{.Type}} · {{.ProjectID}}</div>
			<div class="task-id">{{.DisplayID}}</div>
		</div>
	{{end}}
	</div>
</div>
{{end}}
</div>
<script>
function allowDrop(ev){ ev.preventDefault(); }
function drag(ev){ ev.dataTransfer.setData('id', ev.target.dataset.id); }
function drop(ev){
	ev.preventDefault();
	const id = ev.dataTransfer.getData('id');
	const status = ev.currentTarget.parentElement.dataset.status;
	fetch('/api/v1/tasks/'+id, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})})
		.then(r=>{ if(!r.ok) throw new Error('status update failed'); location.reload(); })
		.catch(e=>alert(e.message));
}
</script>
<style>
.board{display:flex;gap:1rem;overflow-x:auto;}
.board-column{min-width:260px;flex:1;background:var(--bg-2);border-radius:8px;padding:.75rem;}
.board-column h3{margin:0 0 .75rem 0;font-size:1rem;}
.task-list{min-height:120px;}
.task-card{background:var(--bg-1);border:1px solid var(--border);border-radius:6px;padding:.5rem;margin-bottom:.5rem;cursor:grab;}
.task-card .task-title{font-weight:600;}
.task-card .task-meta{font-size:.75rem;color:var(--muted);}
.task-card .task-id{font-size:.75rem;color:var(--muted);text-align:right;}
</style>
{{end}}
