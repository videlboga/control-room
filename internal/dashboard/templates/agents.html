{{template "layout" .}}
{{define "title"}}Агенты{{end}}
{{define "content"}}
<h1>Агенты</h1>
{{range .Teams}}
<div class="card">
	<h2>{{.Name}} ({{.ID}})</h2>
	<table>
		<tr><th>Имя</th><th>Роль</th><th>Профиль Hermes</th><th>Действие</th></tr>
		{{range $name, $agent := .Agents}}
		<tr>
			<td>{{$name}}</td>
			<td>{{.Role}}</td>
			<td>{{.Profile}}</td>
			<td>
				<form class="inline" method="post" action="/api/v1/agents/{{$.ID}}/{{$name}}" onsubmit="return confirm('Удалить агента {{$name}}?')">
					<button type="submit">Удалить</button>
				</form>
			</td>
		</tr>
		{{end}}
	</table>
	<h3>Добавить агента</h3>
	<form method="post" action="/api/v1/agents" id="form-{{.ID}}">
		<input type="hidden" name="team" value="{{.ID}}">
		<input type="text" name="name" placeholder="имя" required>
		<input type="text" name="role" placeholder="роль" required>
		<input type="text" name="profile" placeholder="профиль hermes" required>
		<input type="text" name="clone_from" placeholder="клонировать из (опционально)">
		<button type="submit">Добавить</button>
	</form>
</div>
{{end}}
<script>
document.querySelectorAll('form[id^="form-"]').forEach(function(form) {
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		const fd = new FormData(form);
		const body = {};
		fd.forEach((v,k)=>body[k]=v);
		fetch('/api/v1/agents', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)})
			.then(r=>r.json()).then(()=>location.reload());
	});
});

document.querySelectorAll('form.inline').forEach(function(form) {
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		fetch(form.action, {method:'DELETE'}).then(()=>location.reload());
	});
});
</script>
{{end}}
