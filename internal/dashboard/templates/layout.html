{{define "layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{block "title" .}}Control Room{{end}}</title>
	<style>
		* { box-sizing: border-box; }
		body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: #f6f8fa; color: #24292f; display: flex; }
		.sidebar { width: 220px; background: #ffffff; border-right: 1px solid #d0d7de; min-height: 100vh; padding: 1rem; }
		.sidebar h2 { margin-top: 0; font-size: 1.1rem; }
		.sidebar a { display: block; padding: 0.5rem 0; color: #0969da; text-decoration: none; }
		.sidebar a:hover { text-decoration: underline; }
		.content { flex: 1; padding: 1.5rem 2rem; max-width: 1400px; }
		.card { background: #ffffff; border: 1px solid #d0d7de; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
		.card h2 { margin-top: 0; font-size: 1.15rem; border-bottom: 1px solid #eaeef2; padding-bottom: 0.5rem; }
		table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
		th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eaeef2; }
		th { font-weight: 600; }
		a { color: #0969da; text-decoration: none; }
		a:hover { text-decoration: underline; }
		.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
		.badge-open { background: #fff8c5; color: #7a4d00; }
		.badge-in_progress { background: #daf6ff; color: #0550ae; }
		.badge-pending_review { background: #fff8c5; color: #7a4d00; }
		.badge-approved { background: #d4f8d4; color: #1b7b1b; }
		.badge-rejected { background: #ffebe9; color: #cf222e; }
		.badge-done { background: #f0f0f0; color: #57606a; }
		button, input[type="submit"] { cursor: pointer; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 0.35rem 0.75rem; }
		button:hover { background: #eaeef2; }
		input, select, textarea { padding: 0.35rem 0.5rem; border: 1px solid #d0d7de; border-radius: 6px; margin-right: 0.5rem; }
		.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
		.small { color: #656d76; font-size: 0.85rem; }
		.muted { color: #656d76; }
		form.inline { display: inline; }
		.filters { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
		.log-line { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.75rem; margin: 0.1rem 0; white-space: pre-wrap; }
		.log-time { color: #656d76; }
		.log-box { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 0.5rem; max-height: 240px; overflow-y: auto; }
		.agent-log { color: #1a7f37; }
		.reasoning { color: #8250df; }
	</style>
</head>
<body>
	<div class="sidebar">
		<h2>🎛️ Control Room</h2>
		<a href="/">Главная</a>
		<a href="/agents">Агенты</a>
		<a href="/projects">Проекты</a>
		<a href="/epics">Эпики</a>
		<a href="/tasks">Задачи</a>
		<a href="/board">Board</a>
	</div>
	<div class="content">
		{{template "content" .}}
	</div>
	<script>
		if (typeof EventSource !== 'undefined') {
			const source = new EventSource('/api/v1/events');
			source.onmessage = function(e) {
				const data = JSON.parse(e.data);
				const container = document.getElementById('active-runs');
				if (!container) return;
				if (!data.active_runs || data.active_runs.length === 0) {
					container.innerHTML = '<p class="muted">Нет активных запусков.</p>';
					return;
				}
				container.innerHTML = data.active_runs.map(function(r) {
					const events = (r.events || []).map(function(ev) {
						return '<div class="log-line"><span class="log-time">' + ev.timestamp + '</span> ' + (ev.agent || '') + ' ' + ev.type + (ev.step ? ' ' + ev.step : '') + (ev.tool ? '/' + ev.tool : '') + '</div>';
					}).join('');
					const agentLog = (r.agent_log || []).map(function(line) {
						return '<div class="log-line agent-log">' + escapeHtml(line) + '</div>';
					}).join('');
					return '<div class="card" id="run-card-' + r.run_id + '"><h3><a href="/runs/' + r.run_id + '">' + r.run_id + '</a></h3><p class="small">Проект: ' + (r.project || '') + ' | Задача: ' + (r.task || '') + ' | Статус: ' + r.status + ' | Агент: ' + (r.agent || '') + ' | Шаг: ' + (r.step || '') + '</p><h4>События оркестратора</h4><div class="log-box">' + events + '</div><h4>Лог агента (реалтайм)</h4><div class="log-box">' + agentLog + '</div></div>';
				}).join('');
			};
			function escapeHtml(text) {
				const div = document.createElement('div');
				div.textContent = text;
				return div.innerHTML;
			}
		}
	</script>
</body>
</html>
{{end}}
