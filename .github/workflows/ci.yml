name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, manjaro]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build CLI
        run: go build -buildvcs=false -o ./cr ./cmd/cr

      - name: Build Dashboard
        run: go build -buildvcs=false -o ./dashboard ./cmd/dashboard

      - name: Run unit tests
        run: go test -buildvcs=false -race -count=1 ./...

      - name: Run e2e tests
        run: go test -buildvcs=false -count=1 ./e2e/...

      - name: Lint check
        run: go vet -buildvcs=false ./...

      - name: Build frontend
        run: |
          cd dashboard-frontend && npm install && npx vite build

      - name: Upload cr binary
        uses: actions/upload-artifact@v4
        with:
          name: cr-binary
          path: ./cr
          if-no-files-found: error

      - name: Upload dashboard binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-binary
          path: ./dashboard
          if-no-files-found: error