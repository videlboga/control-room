name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build CLI
        env:
          GOMAXPROCS: 1
        run: go build -buildvcs=false -o /tmp/cr ./cmd/cr

      - name: Run unit tests
        env:
          GOMAXPROCS: 1
        run: go test -buildvcs=false -count=1 ./...

      - name: Run e2e tests
        run: go test -buildvcs=false -count=1 ./e2e/...

      - name: Lint check
        run: go vet -buildvcs=false ./...

      - name: Upload cr binary
        uses: actions/upload-artifact@v4
        with:
          name: cr-binary
          path: /tmp/cr
          if-no-files-found: error
